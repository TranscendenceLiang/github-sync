# Git Multi-Sync Center - default configuration
# See docs/README.md for full schema documentation
sync:
  settings:
    auto_create: true        # 全局启用自动创建，默认 false
    force_push: false          # 检测冲突，不强制覆盖
    delete_remote: true        # Prune stale branches on targets after sync
    mode: mirror               # 全局默认: mirror | rebase
    preserve_files:            # 全局默认保护文件列表（rebase 模式使用）
      - .cnb.yml

  topology:
    - name: "github-happy-next-to-github-and-cnb"
      source:
        platform: github
        owner: TranscendenceLiang
        repo: happy-next
        branch: main
        auth: pat
      targets:
        - platform: github
          owner: TranscendenceLiang
          repo: happy-next
          branch: main
          auth: pat
          auto_create: true
          visibility: public
        - platform: cnb
          owner: TranscendenceLiang
          repo: happy-next
          branch: main
          auth: pat
          auto_create: true
          visibility: public

    - name: "github-video-subtitle-extractor-to-cnb"
      source:
        platform: github
        owner: YaoFANGUK
        repo: video-subtitle-extractor
        branch: main
        auth: pat
      targets:
        - platform: cnb
          owner: TranscendenceLiang
          repo: video-subtitle-extractor
          branch: main
          auth: pat
          auto_create: true
          visibility: public

    - name: "github-ciphertalk-to-cnb"
      mode: rebase              # 条目级覆盖: 使用 rebase
      preserve_files:           # 覆盖全局: 仅保护以下文件
        - .cnb.yml
        - Dockerfile
      source:
        platform: github
        owner: ILoveBingLu
        repo: CipherTalk
        branch: main
        auth: pat
      targets:
        - platform: cnb
          owner: TranscendenceLiang
          repo: CipherTalk
          branch: main
          auth: pat
          auto_create: true
          visibility: private
